<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bisjop Briefing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3b82f6;--green:#22c55e;--orange:#f97316;--red:#ef4444;--purple:#8b5cf6;--gray:#6b7280;--dark:#111827;--light:#f9fafb;--card-bg:#fff;--body-bg:#f3f4f6;--border:#e5e7eb;--text:#111827;--text-secondary:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--body-bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;line-height:1.6}
.app{max-width:640px;margin:0 auto;padding:16px;padding-bottom:80px}

/* Header */
.briefing-header{padding:24px 0 16px;border-bottom:2px solid var(--border);margin-bottom:20px}
.briefing-type{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue)}
.briefing-title{font-size:1.6rem;font-weight:800;line-height:1.2;margin-top:4px}
.briefing-date{font-size:.9rem;color:var(--text-secondary);margin-top:4px}

/* Section navigation (sticky) */
.section-nav{position:sticky;top:0;z-index:50;background:var(--body-bg);padding:8px 0;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;gap:6px;scrollbar-width:none}
.section-nav::-webkit-scrollbar{display:none}
.nav-pill{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:99px;font-size:.8rem;font-weight:600;background:var(--card-bg);border:1.5px solid var(--border);color:var(--text-secondary);text-decoration:none;white-space:nowrap;transition:all .15s;cursor:pointer;flex-shrink:0}
.nav-pill:active{transform:scale(.95)}
.nav-pill.active,.nav-pill:hover{border-color:var(--blue);color:var(--blue);background:#dbeafe}

/* Cards */
.card{background:var(--card-bg);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-icon{font-size:1.4rem}
.card-title{font-size:1.05rem;font-weight:700}
.card-subtitle{font-size:.8rem;color:var(--text-secondary);margin-top:2px}

/* Content styling */
.prose{font-size:.95rem;line-height:1.7}
.prose p{margin-bottom:12px}
.prose p:last-child{margin-bottom:0}
.prose strong{font-weight:700}

/* Metric row */
.metric-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.metric-row:last-child{border-bottom:none}
.metric-label{font-size:.9rem;color:var(--text-secondary)}
.metric-value{font-size:1rem;font-weight:700}
.metric-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:99px;font-size:.8rem;font-weight:600}

/* Status indicators */
.status-green{background:#dcfce7;color:#166534}
.status-yellow{background:#fef3c7;color:#92400e}
.status-red{background:#fee2e2;color:#991b1b}
.status-blue{background:#dbeafe;color:#1d4ed8}
.status-purple{background:#ede9fe;color:#5b21b6}
.status-gray{background:#f3f4f6;color:#374151}

/* Email draft cards */
.draft-card{border-left:4px solid var(--blue);padding-left:16px;margin-bottom:16px}
.draft-card.urgent{border-left-color:var(--red)}
.draft-card.normal{border-left-color:var(--orange)}
.draft-card.low{border-left-color:var(--green)}
.draft-meta{font-size:.8rem;color:var(--text-secondary);margin-bottom:4px}
.draft-subject{font-size:.95rem;font-weight:700;margin-bottom:6px}
.draft-body{font-size:.9rem;line-height:1.6;color:var(--text);white-space:pre-wrap}

/* Calendar event */
.cal-event{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.cal-event:last-child{border-bottom:none}
.cal-time{min-width:60px;font-size:.85rem;font-weight:700;color:var(--blue);white-space:nowrap}
.cal-info{flex:1}
.cal-title{font-size:.9rem;font-weight:600}
.cal-detail{font-size:.8rem;color:var(--text-secondary);margin-top:2px}

/* Task item */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:7px}
.task-dot.overdue{background:var(--red)}
.task-dot.today{background:var(--orange)}
.task-dot.upcoming{background:var(--blue)}
.task-name{font-size:.9rem;font-weight:600}
.task-due{font-size:.8rem;color:var(--text-secondary)}

/* Training card */
.training-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;background:var(--dark);color:#fff;font-weight:700;font-size:1rem;text-decoration:none;margin-top:12px;transition:transform .1s}
.training-link:active{transform:scale(.97)}

/* Alert/flag box */
.alert{padding:12px 16px;border-radius:12px;font-size:.9rem;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.alert-icon{flex-shrink:0;font-size:1.1rem}
.alert-urgent{background:#fee2e2;color:#991b1b}
.alert-warning{background:#fef3c7;color:#92400e}
.alert-info{background:#dbeafe;color:#1d4ed8}
.alert-success{background:#dcfce7;color:#166534}

/* LinkedIn post draft preview */
.post-preview{background:var(--light);border-radius:12px;padding:16px;margin-bottom:12px}
.post-preview.top-pick{border:2px solid var(--orange)}
.post-lang{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-secondary);margin-bottom:6px}
.post-hook{font-size:.95rem;font-weight:600;line-height:1.5;margin-bottom:8px}
.post-body{font-size:.9rem;line-height:1.6;color:var(--text-secondary)}
.post-meta{display:flex;gap:8px;margin-top:10px;font-size:.8rem;color:var(--text-secondary)}

/* Footer */
.briefing-footer{text-align:center;padding:24px 0;font-size:.8rem;color:var(--text-secondary)}
.briefing-footer a{color:var(--blue);text-decoration:none;font-weight:600}

/* Collapsible sections */
.section-toggle{display:none}
.section-content{max-height:none;overflow:hidden;transition:max-height .3s ease}
.collapse-btn{display:inline-flex;align-items:center;gap:4px;font-size:.8rem;color:var(--blue);font-weight:600;cursor:pointer;margin-top:8px;border:none;background:none;padding:4px 0}

/* Dark mode */
@media(prefers-color-scheme:dark){
  :root{--card-bg:#1f2937;--body-bg:#111827;--border:#374151;--text:#f9fafb;--text-secondary:#9ca3af}
  .nav-pill{background:#1f2937;border-color:#374151;color:#9ca3af}
  .nav-pill.active,.nav-pill:hover{border-color:var(--blue);color:#60a5fa;background:#1e3a5f}
  .post-preview{background:#111827}
  .metric-row{border-bottom-color:#374151}
  .cal-event{border-bottom-color:#374151}
  .task-item{border-bottom-color:#374151}
}

/* Print */
@media print{
  .section-nav{display:none}
  .app{padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER — Populated per briefing type -->
  <div class="briefing-header">
    <div class="briefing-type" id="briefing-type">MORGEN BRIEFING</div>
    <div class="briefing-title" id="briefing-title">God morgen, Ole</div>
    <div class="briefing-date" id="briefing-date">Onsdag 2. april 2026</div>
  </div>

  <!-- SECTION NAV — Sticky pills for jumping to sections -->
  <nav class="section-nav" id="section-nav">
    <!-- Pills are generated dynamically based on which sections exist -->
  </nav>

  <!-- SECTIONS CONTAINER — Each section has an anchor ID -->
  <div id="sections">
    <!-- Sections are injected here by the generating task -->
  </div>

  <!-- FOOTER -->
  <div class="briefing-footer">
    Bisjop &middot; <span id="generated-at"></span><br>
    <a href="https://jolkro.github.io/tools/checkin-app.html" id="checkin-link">Check-in</a> &middot;
    <a href="https://jolkro.github.io/tools/training-app.html">Traeningsapp</a>
  </div>

</div>

<script>
// ============================================================
// BISJOP BRIEFING TEMPLATE — Runtime Engine
// ============================================================
// This file is used as a template. Scheduled tasks generate
// briefings by either:
//   (a) Producing a static HTML file based on this template
//   (b) Populating this template via URL params + fetch
//
// Section IDs used across the system:
//   #health, #calendar, #email, #tasks, #training,
//   #braindump, #linkedin, #news, #decisions
// ============================================================

const PIPEDREAM_TRACKING = 'https://eo1z8olrm9ptxdd.m.pipedream.net';

// Track section views for engagement analytics
function trackView(section) {
  try {
    const payload = {
      source: 'briefing_engagement',
      date: new Date().toISOString().slice(0, 10),
      section: section,
      briefing_type: document.getElementById('briefing-type')?.textContent || 'unknown',
      timestamp: new Date().toISOString()
    };
    navigator.sendBeacon(PIPEDREAM_TRACKING, JSON.stringify(payload));
  } catch (e) {
    // Engagement tracking is non-critical — fail silently
  }
}

// Build nav pills from sections present in the DOM
function buildNav() {
  const nav = document.getElementById('section-nav');
  const sections = document.querySelectorAll('[data-section]');
  if (!nav || sections.length === 0) return;

  const icons = {
    health: '💚', calendar: '📅', email: '📧', tasks: '✅',
    training: '🏋️', braindump: '📝', linkedin: '💼', news: '📰',
    decisions: '⚡', drafts: '✉️', approvals: '👍', summary: '📊',
    voice: '🎤', nudges: '🔔'
  };
  const labels = {
    health: 'Sundhed', calendar: 'Kalender', email: 'Email',
    tasks: 'Opgaver', training: 'Traening', braindump: 'Brain Dump',
    linkedin: 'LinkedIn', news: 'Nyheder', decisions: 'Beslutninger',
    drafts: 'Udkast', approvals: 'Godkendelser', summary: 'Overblik',
    voice: 'Voice', nudges: 'Nudges'
  };

  sections.forEach(sec => {
    const id = sec.getAttribute('data-section');
    const pill = document.createElement('a');
    pill.className = 'nav-pill';
    pill.href = '#' + id;
    pill.textContent = (icons[id] || '') + ' ' + (labels[id] || id);
    pill.addEventListener('click', function(e) {
      e.preventDefault();
      sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      trackView(id);
      // Update active pill
      document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });
    nav.appendChild(pill);
  });
}

// Highlight active section on scroll
function setupScrollSpy() {
  const sections = document.querySelectorAll('[data-section]');
  const pills = document.querySelectorAll('.nav-pill');
  if (sections.length === 0) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.getAttribute('data-section');
        pills.forEach(p => {
          p.classList.toggle('active', p.getAttribute('href') === '#' + id);
        });
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });

  sections.forEach(sec => observer.observe(sec));
}

// Set generated-at timestamp
function setTimestamp() {
  const el = document.getElementById('generated-at');
  if (el) {
    const now = new Date();
    el.textContent = 'Genereret ' + now.toLocaleString('da-DK', {
      hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
    });
  }
}

// Track page load
function trackPageLoad() {
  trackView('page_load');
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  buildNav();
  setupScrollSpy();
  setTimestamp();
  trackPageLoad();
});

// ============================================================
// TEMPLATE HELPER: createSection(id, icon, title, contentHTML)
// Used by generating scripts to build sections programmatically
// ============================================================
function createSection(id, icon, title, contentHTML, subtitle) {
  const section = document.createElement('div');
  section.id = id;
  section.setAttribute('data-section', id);
  section.className = 'card';
  section.innerHTML =
    '<div class="card-header">' +
      '<div class="card-icon">' + icon + '</div>' +
      '<div><div class="card-title">' + title + '</div>' +
      (subtitle ? '<div class="card-subtitle">' + subtitle + '</div>' : '') +
      '</div></div>' +
    '<div class="prose">' + contentHTML + '</div>';
  document.getElementById('sections').appendChild(section);
  return section;
}

// Helper: create a metric row
function metricRow(label, value, statusClass) {
  return '<div class="metric-row">' +
    '<span class="metric-label">' + label + '</span>' +
    '<span class="metric-value">' +
    (statusClass ? '<span class="metric-badge ' + statusClass + '">' + value + '</span>' : value) +
    '</span></div>';
}

// Helper: create a calendar event row
function calEvent(time, title, detail) {
  return '<div class="cal-event">' +
    '<div class="cal-time">' + time + '</div>' +
    '<div class="cal-info"><div class="cal-title">' + title + '</div>' +
    (detail ? '<div class="cal-detail">' + detail + '</div>' : '') +
    '</div></div>';
}

// Helper: create an alert box
function alertBox(type, icon, message) {
  return '<div class="alert alert-' + type + '">' +
    '<span class="alert-icon">' + icon + '</span>' +
    '<span>' + message + '</span></div>';
}

// Helper: create a task item
function taskItem(name, due, status) {
  return '<div class="task-item">' +
    '<div class="task-dot ' + status + '"></div>' +
    '<div><div class="task-name">' + name + '</div>' +
    '<div class="task-due">' + due + '</div></div></div>';
}

// Helper: create a training link button
function trainingButton(label, url) {
  return '<a href="' + url + '" class="training-link">' + label + ' &rarr;</a>';
}

// Helper: create an email draft preview
function draftPreview(priority, to, subject, body) {
  return '<div class="draft-card ' + priority + '">' +
    '<div class="draft-meta">Til: ' + to + '</div>' +
    '<div class="draft-subject">' + subject + '</div>' +
    '<div class="draft-body">' + body + '</div></div>';
}

// Helper: create a LinkedIn post preview
function postPreview(lang, hook, body, isTopPick) {
  return '<div class="post-preview' + (isTopPick ? ' top-pick' : '') + '">' +
    (isTopPick ? '<div class="post-lang" style="color:var(--orange)">TOP PICK</div>' : '') +
    '<div class="post-lang">' + lang + '</div>' +
    '<div class="post-hook">' + hook + '</div>' +
    '<div class="post-body">' + body + '</div></div>';
}
</script>

<!--
============================================================
USAGE INSTRUCTIONS FOR SCHEDULED TASKS
============================================================

To generate a briefing, the scheduled task should:

1. Copy this template file
2. Replace the header fields (briefing-type, briefing-title, briefing-date)
3. Build sections using the helper functions in a <script> block:

Example for a Morning Briefing:

<script>
document.getElementById('briefing-type').textContent = 'MORGEN BRIEFING';
document.getElementById('briefing-title').textContent = 'God morgen, Ole';
document.getElementById('briefing-date').textContent = 'Onsdag 2. april 2026';

createSection('health', '💚', 'Sundhed',
  metricRow('Sovn', '7t 12m', 'status-green') +
  metricRow('HRV', '45 ms', 'status-green') +
  metricRow('Hvilepuls', '56 bpm', 'status-green') +
  metricRow('Readiness', 'Normal dag', 'status-green')
);

createSection('training', '🏋️', 'Traening',
  '<p>Session B: Pull + Hinge (normal belastning)</p>' +
  trainingButton('Start traening', 'https://jolkro.github.io/tools/training-app.html?session=B&readiness=normal'),
  'Planlagt: Man/Ons/Fre'
);

createSection('calendar', '📅', 'Kalender',
  calEvent('10:00', 'Standup med teamet', 'Google Meet') +
  calEvent('14:00', 'Laege', 'Personlig'),
  '2 begivenheder i dag'
);

createSection('email', '📧', 'Email',
  alertBox('urgent', '🔴', '1 urgent email fra Anders (Easygoing)') +
  '<p>4 nye emails i alt. 2 kraever svar, 2 er FYI.</p>',
  '4 nye siden i gar'
);

createSection('tasks', '✅', 'Opgaver',
  taskItem('Faerdiggor kontrakt', 'Forfalden i gar', 'overdue') +
  taskItem('Review marketing deck', 'I dag', 'today') +
  taskItem('Forbered pitch', 'Fredag', 'upcoming'),
  '1 overskredet, 1 i dag'
);

createSection('decisions', '⚡', 'Beslutninger',
  '<p>3 udkast venter pa godkendelse fra i gar.</p>' +
  '<p>Easygoing: Svar til Anders om leverandor?</p>'
);

// Rebuild nav after all sections are added
buildNav();
setupScrollSpy();
</script>

Briefing types and their sections:

MORNING:    health, training, calendar, email, braindump, tasks, decisions
MIDDAY:     email, approvals, tasks, drafts
EVENING:    summary, email, voice, nudges, news, decisions
LINKEDIN:   linkedin (findings + post ideas)
LINKEDIN-DRAFTS: drafts (post/comment previews)
SUNDAY:     summary, calendar, tasks, training, decisions

Save the generated file as:
  briefings/YYYY-MM-DD-morning.html
  briefings/YYYY-MM-DD-midday.html
  briefings/YYYY-MM-DD-evening.html
  briefings/YYYY-MM-DD-linkedin.html
  briefings/YYYY-MM-DD-linkedin-drafts.html

============================================================
-->

</body>
</html>
