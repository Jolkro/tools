<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Træning</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#3b82f6;--green:#22c55e;--orange:#f97316;--red:#ef4444;--purple:#8b5cf6;--gray:#6b7280;--dark:#111827;--light:#f9fafb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;color:var(--dark);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:100px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-accent{border-left:4px solid var(--blue)}
h1{font-size:1.5rem;font-weight:800;line-height:1.2}
h2{font-size:1.2rem;font-weight:700}
h3{font-size:1rem;font-weight:600}
p{line-height:1.5}
.text-sm{font-size:.875rem}
.text-xs{font-size:.75rem}
.text-gray{color:var(--gray)}
.text-center{text-align:center}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}
.flex-wrap{flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:.75rem;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-orange{background:#ffedd5;color:#c2410c}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-gray{background:#f3f4f6;color:#374151}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:14px;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:transform .1s,opacity .1s;-webkit-appearance:none}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--dark);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:2px solid #e5e7eb;color:var(--dark)}
.btn-sm{padding:10px 16px;font-size:.875rem;width:auto;border-radius:10px}
.progress-bar{height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:99px;transition:width .5s ease}
.timer-display{font-size:4rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.timer-ring{width:200px;height:200px;margin:0 auto}
.timer-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.timer-ring .bg{stroke:#e5e7eb}
.timer-ring .fg{transition:stroke-dashoffset .3s linear}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px}
.set-btn{padding:12px 8px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;font-weight:700;font-size:1rem;cursor:pointer;text-align:center;transition:all .15s}
.set-btn.active{border-color:var(--blue);background:#dbeafe;color:#1d4ed8}
.set-btn.done{border-color:var(--green);background:#dcfce7;color:#166534}
.rpe-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.rpe-btn{padding:12px 4px;border-radius:10px;border:2px solid #e5e7eb;background:#fff;font-weight:700;font-size:.9rem;cursor:pointer;text-align:center;transition:all .15s}
.rpe-btn.selected{color:#fff}
.rpe-btn.rpe-low{border-color:var(--green);background:var(--green)}
.rpe-btn.rpe-mid{border-color:var(--orange);background:var(--orange)}
.rpe-btn.rpe-high{border-color:var(--red);background:var(--red)}
.checklist-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--light);margin-bottom:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.checklist-item .check{width:24px;height:24px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.checklist-item.checked .check{border-color:var(--green);background:var(--green);color:#fff}
.checklist-item.checked span{text-decoration:line-through;opacity:.6}
.tip-box{background:#eff6ff;border-radius:12px;padding:14px;margin-top:12px}
.tip-box p{font-size:.8rem;color:#1e40af;margin-bottom:4px}
.tip-box .label{font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;color:#3b82f6}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay-content{background:#fff;border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center}
.summary-exercise{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6}
.summary-exercise:last-child{border-bottom:none}
.nav-dots{display:flex;justify-content:center;gap:6px;margin:12px 0}
.nav-dot{width:8px;height:8px;border-radius:50%;background:#d1d5db}
.nav-dot.active{background:var(--blue);width:24px;border-radius:4px}
.save-status{padding:12px;border-radius:12px;font-size:.875rem;font-weight:600;text-align:center;margin-top:12px}
.save-ok{background:#dcfce7;color:#166534}
.save-err{background:#fee2e2;color:#991b1b}
.hidden{display:none!important}
@media(prefers-color-scheme:dark){
  body{background:#111827;color:#f9fafb}
  .card{background:#1f2937;box-shadow:none}
  .checklist-item{background:#374151}
  .tip-box{background:#1e3a5f}
  .tip-box p{color:#93c5fd}
  .tip-box .label{color:#60a5fa}
  .set-btn,.rpe-btn{background:#374151;border-color:#4b5563;color:#f9fafb}
  .set-btn.active{background:#1e3a5f;border-color:var(--blue);color:#93c5fd}
  .set-btn.done{background:#14532d;border-color:var(--green);color:#86efac}
  .btn-outline{border-color:#4b5563;color:#f9fafb}
  .progress-bar,.timer-ring .bg{background:#374151;stroke:#374151}
  .badge-gray{background:#374151;color:#d1d5db}
}
.demo-container{background:var(--light);border-radius:12px;padding:12px;margin:8px 0;text-align:center;overflow:hidden}
.demo-container svg{color:var(--blue)}
@media(prefers-color-scheme:dark){.demo-container{background:#374151}.demo-container svg{color:#60a5fa}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes setComplete{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes exerciseComplete{0%{background-color:var(--green);opacity:1}100%{background-color:transparent;opacity:0}}
</style>
</head>

function BDF(fr,w=80,h=120,dur=2.5){
  const v=i=>fr.map(f=>f[i]).join(';'),sp=Array(fr.length-1).fill('.4 0 .6 1').join(';');
  const A=(a,i)=>`<animate attributeName="${a}" values="${v(i)}" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keySplines="${sp}"/>`;
  const L=(a,b,c,d,sw=2.5)=>`<line stroke="currentColor" stroke-width="${sw}" stroke-linecap="round">${A('x1',a)}${A('y1',b)}${A('x2',c)}${A('y2',d)}</line>`;
  return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="max-width:180px;max-height:150px;display:block;margin:0 auto;color:var(--blue)"><line x1="5" y1="${h-5}" x2="${w-5}" y2="${h-5}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4"/><circle r="6" fill="none" stroke="currentColor" stroke-width="2.5">${A('cx',0)}${A('cy',1)}</circle>${L(2,3,4,5)}${L(2,3,6,7,2)}${L(2,3,8,9,2)}${L(4,5,10,11)}${L(10,11,12,13)}${L(4,5,14,15)}${L(14,15,16,17)}</svg>`;
}
function BDS(fr,w=130,h=75,dur=2.5,extra=''){

  const A=(a,i)=>`<animate attributeName="${a}" values="${v(i)}" dur="${dur}s" repeatCount="indefinite" calcMode="spline" keySplines="${sp}"/>`;
  const L=(a,b,c,d,sw=2.5)=>`<line stroke="currentColor" stroke-width="${sw}" stroke-linecap="round">${A('x1',a)}${A('y1',b)}${A('x2',c)}${A('y2',d)}</line>`;
  return`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="max-width:180px;max-height:150px;display:block;margin:0 auto;color:var(--blue)"><line x1="5" y1="${h-5}" x2="${w-5}" y2="${h-5}" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4"/><circle r="6" fill="none" stroke="currentColor" stroke-width="2.5">${A('cx',0)}${A('cy',1)}</circle>${L(2,3,4,5)}${L(2,3,6,7,2)}${L(4,5,8,9)}${L(8,9,10,11)}${extra}</svg>`;
}

// ─── WAKE LOCK ─────────────────────────────────────────────────────
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return false;
  try {
    state.wakeLock = await navigator.wakeLock.request('screen');
    state.wakeLockActive = true;
    state.wakeLock.addEventListener('release', () => {
      state.wakeLockActive = false;
      render();
    });
    render();
    return true;
  } catch (e) {
    console.log('Wake Lock failed:', e);
    state.wakeLockActive = false;
    return false;
  }
}

async function releaseWakeLock() {
  if (state.wakeLock) {
    await state.wakeLock.release();
    state.wakeLock = null;
  }
  state.wakeLockActive = false;
  render();
}

async function toggleWakeLock() {
  if (state.wakeLockActive) {
    await releaseWakeLock();
  } else {
    await requestWakeLock();
  }
}

// Re-acquire wake lock when returning to the tab (iOS releases it on tab switch)
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && state.wakeLockActive && state.wakeLock?.released !== false) {
    await requestWakeLock();
  }
});

function autoSession() {
  const d = new Date().getDay(); // 0=Sun
  if (d === 1) return 'A'; // Mon
  if (d === 3) return 'B'; // Wed
  if (d === 5) return 'C'; // Fri
  return 'A'; // default
}

function getSession() { return SESSIONS[state.sessionKey]; }
function getReadiness() { return READINESS[state.readiness]; }
function adjustedSets(ex) { return state.readiness === 'easy' ? Math.max(ex.sets - 1, 2) : ex.sets; }
function adjustedRPE(ex) { return ex.rpe ? (state.readiness === 'easy' ? ex.rpe - 1 : ex.rpe) : null; }

function render() {
  switch(state.screen) {
    case 'home': return renderHome();
    case 'warmup': return renderWarmup();
    case 'exercise': return renderExercise();
    case 'rest': return renderRest();
    case 'cooldown': return renderCooldown();
    case 'done': return renderDone();
    case 'mobility': return renderMobility();
  }
}

    const avgSetTime = 45; // seconds per set (including reps)
    const avgRestTime = 75; // seconds between sets

    session.exercises.forEach(ex => {
      const sets = readiness === 'easy' ? Math.max(ex.sets - 1, 2) : ex.sets;
      totalSets += sets;
    });
    const warmup = 5 * 60;
    const cooldown = 5 * 60;
    const totalExerciseTime = totalSets * (avgSetTime + avgRestTime);
    return Math.round((warmup + totalExerciseTime + cooldown) / 60);

          `}

          ${rpe ? `
            <p class="text-xs text-gray mt-3 mb-2">RPE (hvordan føltes det?):</p>
            <div class="rpe-grid">
              ${[5,6,7,8,9,10].map(v => {
                const logged = exLog.sets[state.setIndex];
                const sel = logged && logged.rpe === v;
                const cls = sel ? (v <= 6 ? 'selected rpe-low' : v <= 8 ? 'selected rpe-mid' : 'selected rpe-high') : '';
                return `<div class="rpe-btn ${cls}" onclick="logRPE(${v})">${v}</div>`;
              }).join('')}
            </div>
          ` : ''}
        </div>
      </div>

      <div class="flex gap-2">
        ${state.exIndex > 0 ? `<button class="btn btn-outline" style="flex:1" onclick="prevExercise()">← Forrige</button>` : ''}
        <button class="btn ${allSetsLogged() ? 'btn-green' : 'btn-primary'}" style="flex:2" onclick="nextAction()">
          ${allSetsLogged() ? (state.exIndex < totalEx - 1 ? 'Næste øvelse →' : 'Til nedkøling →') : 'Spring over →'}
        </button>
      </div>
    </div>`;
}

function renderRest() {
  const pct = state.timerTotal > 0 ? ((state.timerTotal - state.timerSeconds) / state.timerTotal) * 100 : 0;
  const circumference = 2 * Math.PI * 90;
  const offset = circumference - (pct / 100) * circumference;

  app().innerHTML = `
    <div class="text-center" style="padding-top:40px">
      <p class="text-sm text-gray mb-2">Hvil</p>
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="bg" cx="100" cy="100" r="90" stroke="#e5e7eb"/>
        <circle class="fg" cx="100" cy="100" r="90" stroke="var(--blue)"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
          transform="rotate(-90 100 100)"/>
      </svg>
      <div class="timer-display mt-2" style="color:${state.timerSeconds <= 5 ? 'var(--red)' : 'var(--dark)'}">${state.timerSeconds}</div>
      <p class="text-sm text-gray mt-1">sekunder</p>
      <div class="flex gap-2 mt-4" style="max-width:300px;margin:0 auto">
        <button class="btn btn-outline" onclick="adjustTimer(-15)">−15s</button>
        <button class="btn btn-outline" onclick="adjustTimer(15)">+15s</button>
      </div>
      <button class="btn btn-primary mt-3" onclick="skipRest()" style="max-width:300px;margin:16px auto 0">
        Spring hvil over →
      </button>
    </div>`;
}

function renderCooldown() {
  const s = getSession();
  const elapsedTime = formatTime(getWorkoutElapsedSeconds());
  app().innerHTML = `
    <div>
      <div class="flex justify-between items-center mb-4">
        <span class="badge badge-blue">Nedkøling</span>
        <span class="badge badge-gray" style="font-variant-numeric:tabular-nums">⏱ ${elapsedTime}</span>
      </div>
      <div class="card" style="border-left:4px solid var(--blue)">
        <h2>Nedkøling</h2>
        <p class="text-sm text-gray mb-3">Tag dig tid. Din krop har fortjent det.</p>
        ${s.cooldown.exercises.map((ex, i) => {
          const demoFn = getWarmupDemo(ex);
          const desc = getExerciseDesc(ex);
          const showDemo = state.cooldownDemoIndex === i;
          return `
          <div style="margin-bottom:4px">
            <div class="checklist-item ${state.cooldownChecked.includes(i)?'checked':''}" onclick="toggleCooldown(${i})" style="margin-bottom:0">
              <div class="check">${state.cooldownChecked.includes(i)?'✓':''}</div>
              <span style="flex:1">${ex}</span>
              ${(demoFn || desc) ? `<button onclick="event.stopPropagation();toggleCooldownDemo(${i})" style="background:none;border:none;color:var(--blue);font-size:.85rem;font-weight:600;padding:4px 8px;cursor:pointer;flex-shrink:0">${showDemo ? '▾' : '?'}</button>` : ''}
            </div>
            ${showDemo ? `<div class="demo-container">${demoFn ? demoFn() : ''}${desc ? '<p style="font-size:.8rem;color:var(--gray);margin-top:8px;text-align:left;line-height:1.5">' + desc + '</p>' : ''}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      <button class="btn btn-green" onclick="finishWorkout()">
        ✓ Session færdig!
      </button>
    </div>`;
}

function renderDone() {
  const s = getSession();
  const totalSeconds = getWorkoutElapsedSeconds();
  const dur = state.startTime ? Math.round((Date.now() - state.startTime) / 60000) : '?';
  const r = getReadiness();

  // Calculate stats
  let totalSets = 0;
  let totalRPEs = [];
  let exerciseSummary = s.exercises.map((ex, i) => {
    const exLog = state.log[i];
    if (!exLog || exLog.sets.length === 0) return `
      <div class="summary-exercise">
        <span>${ex.name}</span>
        <span class="text-sm text-gray">Sprunget over</span>
      </div>`;
    const setStr = exLog.sets.map(s => {
      if (s && s.rpe) totalRPEs.push(s.rpe);
      return s ? `${s.reps || '✓'}${s.rpe ? ` @${s.rpe}` : ''}` : '—';
    }).join(', ');
    totalSets += exLog.sets.filter(x => x).length;
    return `
      <div class="summary-exercise">
        <div>
          <span style="font-weight:600">${ex.name}</span>
          <p class="text-xs text-gray">${setStr}</p>
        </div>
        <span class="badge badge-green">✓</span>
      </div>`;
  }).join('');

  const avgRPE = totalRPEs.length > 0 ? (totalRPEs.reduce((a, b) => a + b, 0) / totalRPEs.length).toFixed(1) : null;
  const durationFormatted = formatTime(totalSeconds);

  app().innerHTML = `
    <div class="text-center" style="padding-top:32px">
      <div style="font-size:3.5rem;animation:pulse 0.6s ease-out">💪</div>
      <h1 class="mt-2">Stærkt arbejde!</h1>
      <p class="text-gray mt-1">${s.name}</p>
      <span class="badge badge-${r.color === 'blue' ? 'blue' : r.color === 'green' ? 'green' : r.color === 'orange' ? 'orange' : 'red'} mt-2">${r.emoji} ${r.label}</span>
    </div>

    <div class="card mt-4">
      <h3 class="mb-3">Træningsstatistik</h3>
      <div class="flex justify-between items-center" style="padding:8px 0;border-bottom:1px solid #f3f4f6">
        <span>Varighed</span>
        <span style="font-weight:600;font-variant-numeric:tabular-nums">${durationFormatted}</span>
      </div>
      <div class="flex justify-between items-center" style="padding:8px 0;border-bottom:1px solid #f3f4f6">
        <span>Sæt gennemført</span>
        <span style="font-weight:600">${totalSets}</span>
      </div>
      ${avgRPE ? `
      <div class="flex justify-between items-center" style="padding:8px 0">
        <span>Gennemsnitligt RPE</span>
        <span style="font-weight:600">${avgRPE}</span>
      </div>` : ''}
    </div>

    <div class="card">
      <h3 class="mb-2">Øvelser</h3>
      ${exerciseSummary}
    </div>

    <div id="save-status"></div>

    <button class="btn btn-primary mt-3" onclick="goHome()">
      ← Tilbage til start
    </button>`;

  // Play celebration sound and trigger animation
  setTimeout(() => playOdeToJoy(), 300);
  saveWorkout();
}

function renderMobility() {
  app().innerHTML = `
    <div>
      <button style="background:none;border:none;color:var(--gray);font-weight:600;cursor:pointer;margin-bottom:16px" onclick="goHome()">← Tilbage</button>
      <div class="card" style="border-left:4px solid var(--red)">
        <h2>Mobility Flow 🔴</h2>
        <p class="text-sm text-gray mb-3">Blid og restituerende — ca. 20 min</p>
        ${MOBILITY.map((m, i) => `
          <div class="checklist-item" onclick="this.classList.toggle('checked');this.querySelector('.check').textContent=this.classList.contains('checked')?'✓':''">
            <div class="check"></div>
            <span>${m.name} — ${m.duration}</span>
          </div>
        `).join('')}
      </div>
      <button class="btn btn-red" onclick="goHome()">Færdig</button>
    </div>`;
}

// ─── ACTIONS ────────────────────────────────────────────────────────
function changeSession(key) { state.sessionKey = key; state.log = {}; render(); }
function changeReadiness(val) { state.readiness = val; state.log = {}; render(); }
function goHome() { clearTimer(); stopWorkoutTimer(); releaseWakeLock(); state.screen = 'home'; state.exIndex = 0; state.setIndex = 0; state.showTips = false; render(); }
function startMobility() { state.screen = 'mobility'; render(); }

function startWorkout() {
  state.startTime = Date.now();
  state.log = {};
  state.warmupChecked = [];
  state.cooldownChecked = [];
  state.warmupDemoIndex = -1;
  state.cooldownDemoIndex = -1;
  state.totalSetsCompleted = 0;
  state.screen = 'warmup';
  startWorkoutTimer();
  render();
}

function startWorkoutTimer() {
  if (state.workoutTimerInterval) clearInterval(state.workoutTimerInterval);
  state.workoutTimerInterval = setInterval(() => {
    render();
  }, 1000);
}

function stopWorkoutTimer() {
  if (state.workoutTimerInterval) clearInterval(state.workoutTimerInterval);
}

function getWorkoutElapsedSeconds() {
  return state.startTime ? Math.floor((Date.now() - state.startTime) / 1000) : 0;
}

function formatTime(totalSeconds) {
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  if (hours > 0) {
    return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }
  return `${minutes}:${String(seconds).padStart(2, '0')}`;
}

function toggleWarmup(i) {
  const idx = state.warmupChecked.indexOf(i);
  if (idx >= 0) state.warmupChecked.splice(idx, 1);
  else state.warmupChecked.push(i);
  render();
}

function toggleCooldown(i) {
  const idx = state.cooldownChecked.indexOf(i);
  if (idx >= 0) state.cooldownChecked.splice(idx, 1);
  else state.cooldownChecked.push(i);
  render();
}

function startExercises() {
  state.exIndex = 0;
  state.setIndex = 0;
  state.screen = 'exercise';
  state.showTips = false;
  render();
  window.scrollTo(0, 0);
}

function toggleTips() { state.showTips = !state.showTips; render(); }

function toggleWarmupDemo(i) { state.warmupDemoIndex = state.warmupDemoIndex === i ? -1 : i; render(); }
function toggleCooldownDemo(i) { state.cooldownDemoIndex = state.cooldownDemoIndex === i ? -1 : i; render(); }

function goToSet(i) { state.setIndex = i; render(); }

function jumpToExercise(i) {
  state.exIndex = i;
  state.setIndex = 0;
  state.showTips = false;
  render();
  window.scrollTo(0, 0);
}

function isTimedExercise(ex) {
  return /sek|sec|hold/i.test(ex.reps) && !/hvert ben|hver side/i.test(ex.reps);
}

function logReps(n) {
  if (!state.log[state.exIndex]) state.log[state.exIndex] = { sets: [], completed: false };
  const exLog = state.log[state.exIndex];
  if (!exLog.sets[state.setIndex]) exLog.sets[state.setIndex] = {};
  exLog.sets[state.setIndex].reps = n;
  checkSetComplete();
  render();
}

function logTimedSet() {
  if (!state.log[state.exIndex]) state.log[state.exIndex] = { sets: [], completed: false };
  const exLog = state.log[state.exIndex];
  exLog.sets[state.setIndex] = { reps: '✓', rpe: null };
  advanceSet();
}

function logRPE(val) {
  if (!state.log[state.exIndex]) state.log[state.exIndex] = { sets: [], completed: false };
  const exLog = state.log[state.exIndex];
  if (!exLog.sets[state.setIndex]) exLog.sets[state.setIndex] = {};
  exLog.sets[state.setIndex].rpe = val;
  checkSetComplete();
  render();
}

function checkSetComplete() {
  const ex = getSession().exercises[state.exIndex];
  const exLog = state.log[state.exIndex];
  const setData = exLog.sets[state.setIndex];
  if (!setData) return;

  const rpe = adjustedRPE(ex);
  const hasReps = setData.reps != null;
  const hasRPE = !rpe || setData.rpe != null;

  if (hasReps && hasRPE) {
    // Auto-advance after short delay
    setTimeout(() => advanceSet(), 400);
  }
}

function advanceSet() {
  const ex = getSession().exercises[state.exIndex];
  const numSets = adjustedSets(ex);
  const exLog = state.log[state.exIndex];

  if (state.setIndex < numSets - 1) {
    state.setIndex++;
    state.totalSetsCompleted++;
    startRestTimer(75); // default 75 sec rest
  } else {
    state.totalSetsCompleted++;
    exLog.completed = true;
    // Show brief celebration before advancing
    render();
    setTimeout(() => {
      state.screen = 'exercise';
      render();
    }, 800);
  }
}

function allSetsLogged() {
  const ex = getSession().exercises[state.exIndex];
  const numSets = adjustedSets(ex);
  const exLog = state.log[state.exIndex];
  if (!exLog) return false;
  return exLog.sets.filter(s => s != null).length >= numSets;
}

function nextAction() {
  const s = getSession();
  const exLog = state.log[state.exIndex];
  if (exLog) exLog.completed = true;

  if (state.exIndex < s.exercises.length - 1) {
    state.exIndex++;
    state.setIndex = 0;
    state.showTips = false;
    state.screen = 'exercise';
  } else {
    state.screen = 'cooldown';
  }
  render();
  window.scrollTo(0, 0);
}

function prevExercise() {
  if (state.exIndex > 0) {
    state.exIndex--;
    state.setIndex = 0;
    state.showTips = false;
    render();
    window.scrollTo(0, 0);
  }
}

function finishWorkout() { state.screen = 'done'; render(); }

// ─── TIMER ──────────────────────────────────────────────────────────
function startRestTimer(seconds) {
  clearTimer();
  state.timerSeconds = seconds;
  state.timerTotal = seconds;
  state.screen = 'rest';
  render();

  state.timerInterval = setInterval(() => {
    state.timerSeconds--;
    if (state.timerSeconds <= 0) {
      clearTimer();
      playBeep();
      state.screen = 'exercise';
      render();
      window.scrollTo(0, 0);
    } else {
      render();
    }
  }, 1000);
}

function clearTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
}

function adjustTimer(delta) {
  state.timerSeconds = Math.max(5, state.timerSeconds + delta);
  state.timerTotal = Math.max(state.timerTotal, state.timerSeconds);
  render();
}

function skipRest() {
  clearTimer();
  state.screen = 'exercise';
  render();
  window.scrollTo(0, 0);
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.1);
    });
  } catch(e) {}
}

function playOdeToJoy() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Ode to Joy melody (starting from "Freude, schöner Götterfunken" theme)
    // D D E F F E D C B B C D D C C (quarter notes)
    const notes = [
      {freq: 293.66, duration: 0.5},  // D
      {freq: 293.66, duration: 0.5},  // D
      {freq: 329.63, duration: 0.5},  // E
      {freq: 349.23, duration: 0.5},  // F
      {freq: 349.23, duration: 0.5},  // F
      {freq: 329.63, duration: 0.5},  // E
      {freq: 293.66, duration: 0.5},  // D
      {freq: 261.63, duration: 0.5},  // C
      {freq: 246.94, duration: 0.5},  // B
      {freq: 246.94, duration: 0.5},  // B
      {freq: 261.63, duration: 0.5},  // C
      {freq: 293.66, duration: 0.5},  // D
      {freq: 293.66, duration: 0.5},  // D (hold longer)
      {freq: 261.63, duration: 0.75},  // C
      {freq: 261.63, duration: 0.75}   // C (finish)
    ];

    let time = ctx.currentTime;
    const tempo = 0.4; // ~120 BPM

    notes.forEach(note => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = note.freq;

      const dur = note.duration * tempo;
      gain.gain.setValueAtTime(0.25, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + dur * 0.9);
      gain.gain.setValueAtTime(0, time + dur);

      osc.start(time);
      osc.stop(time + dur);

      time += dur;
    });
  } catch(e) {}
}

// ─── SAVE ───────────────────────────────────────────────────────────
function saveWorkout() {
  const s = getSession();
  const endTime = Date.now();
  const payload = {
    date: new Date().toISOString().slice(0, 10),
    session: state.sessionKey,
    sessionName: s.name,
    readiness: state.readiness,
    startTime: state.startTime ? new Date(state.startTime).toTimeString().slice(0,5) : null,
    endTime: new Date(endTime).toTimeString().slice(0,5),
    durationMinutes: state.startTime ? Math.round((endTime - state.startTime) / 60000) : null,
    exercises: s.exercises.map((ex, i) => ({
      name: ex.name,
      targetSets: adjustedSets(ex),
      targetReps: ex.reps,
      targetRPE: adjustedRPE(ex),
      sets: (state.log[i]?.sets || []).map((s, si) => ({
        set: si + 1,
        reps: s?.reps || null,
        rpe: s?.rpe || null
      })),
      completed: state.log[i]?.completed || false
    }))
  };

  // Try webhook
  if (state.webhook) {
    fetch(state.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(r => {
      if (r.ok) {
        document.getElementById('save-status').innerHTML = '<div class="save-status save-ok">✓ Træningslog gemt! Aftenbriefingen samler den op.</div>';
      } else {
        throw new Error('Webhook returned ' + r.status);
      }
    })
    .catch(e => {
      showFallbackSave(payload);
    });
  } else {
    showFallbackSave(payload);
  }
}

function showFallbackSave(payload) {
  const summary = formatSummaryText(payload);
  document.getElementById('save-status').innerHTML = `
    <div class="save-status save-err" style="background:#fef3c7;color:#92400e">
      ⚠️ Ingen webhook konfigureret. Kopiér oversigten nedenfor til ClickUp Brain Dump.
    </div>
    <div class="card mt-2">
      <pre style="font-size:.75rem;white-space:pre-wrap;word-break:break-word;font-family:monospace">${summary}</pre>
      <button class="btn btn-outline mt-2" onclick="copyToClipboard()">📋 Kopiér til udklipsholder</button>
    </div>`;
  window._workoutSummary = summary;
}

function formatSummaryText(p) {
  let t = `Træning ${p.date} — ${p.sessionName}\n`;
  t += `Readiness: ${p.readiness} | Tid: ${p.startTime}–${p.endTime} (${p.durationMinutes} min)\n\n`;
  p.exercises.forEach(ex => {
    const sets = ex.sets.map(s => `${s.reps || '—'}${s.rpe ? ' @RPE'+s.rpe : ''}`).join(', ');
    t += `${ex.name}: ${sets || 'sprunget over'}${ex.completed ? ' ✓' : ''}\n`;
  });
  return t;
}

function copyToClipboard() {
  if (window._workoutSummary) {
    navigator.clipboard.writeText(window._workoutSummary).then(() => {
      const btn = event.target;
      btn.textContent = '✓ Kopieret!';
      setTimeout(() => { btn.textContent = '📋 Kopiér til udklipsholder'; }, 2000);
    });
  }
}

// ─── UTIL ───────────────────────────────────────────────────────────
function formatDate() {
  const d = new Date();
  const days = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  const months = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ─── INIT ───────────────────────────────────────────────────────────
render();
</script>
